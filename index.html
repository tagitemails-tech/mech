
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mech-Sphere Industries - Hydraulic Fittings & CNC Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mech-blue: #0c3c8c;
            --mech-orange: #f37021;
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .font-condensed { font-family: 'Roboto Condensed', sans-serif; }
        
        .blue-grid-bg {
            background-color: var(--mech-blue);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .orange-border-diagonal {
            position: relative;
        }
        .orange-border-diagonal::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--mech-orange);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }

        .diagonal-bg-split {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }
    </style>
